name: Agent Kreator Konten

on:
  schedule:
    - cron: '0 2 * * *'   # 09:00 WIB setiap hari
  workflow_dispatch:

jobs:
  buat-konten:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install sistem
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq imagemagick ffmpeg fonts-liberation
          echo '<policymap><policy domain="coder" rights="read|write" pattern="@*"/></policymap>' | sudo tee /etc/ImageMagick-6/policy.xml

      - name: Install Python packages
        run: pip install -r agents/konten/requirements.txt

      - name: Jalankan kreator konten
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python agents/konten/kreator_konten.py
