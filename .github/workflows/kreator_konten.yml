name: Agent Kreator Konten

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  buat-konten:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install sistem
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq imagemagick ffmpeg fonts-liberation
          echo '<policymap><policy domain="coder" rights="read|write" pattern="@*"/></policymap>' | sudo tee /etc/ImageMagick-6/policy.xml
          echo "Install sistem selesai"

      - name: Install Python packages
        run: |
          pip install -r agents/konten/requirements.txt
          echo "Install Python selesai"

      - name: Cek environment
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: |
          echo "SUPABASE_URL set: ${{ secrets.SUPABASE_URL != '' }}"
          echo "SUPABASE_KEY set: ${{ secrets.SUPABASE_KEY != '' }}"
          echo "BOT_TOKEN set: ${{ secrets.BOT_TOKEN != '' }}"
          echo "CHAT_ID set: ${{ secrets.CHAT_ID != '' }}"
          echo "GEMINI_KEY set: ${{ secrets.GEMINI_KEY != '' }}"
          python --version
          python -c "import httpx, moviepy, PIL, numpy; print('Semua library OK')"

      - name: Jalankan kreator konten
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python agents/konten/kreator_konten.py
